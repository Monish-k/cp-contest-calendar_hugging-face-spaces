name: Update Calendar and Ping Spaces

on:
  schedule:
    - cron: '0 0 * * *'   # everyday
  workflow_dispatch:

jobs:
  # JOB 1: Your existing contest calendar updater
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        run: python bot.py

      - name: Commit ICS
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add contests.ics
          git commit -m "update calendar" || echo "no changes"
          git push

  # JOB 2: The Hugging Face Space pinger
  ping-spaces:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        space_url: 
          - "https://monish-k-self-correcting-sql-agent.hf.space"
          - "https://monish-k-agentic-auditor.hf.space"
    steps:
      - name: Ping Hugging Face Space
        run: |
          curl -I "${{ matrix.space_url }}"
